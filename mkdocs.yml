site_name: Fabrica Modelo - Proposta FINEP
site_description: Documentacao para submissao FINEP - Sistema Techsus + P&D
site_url: https://takwaratec.github.io/fabrica-modelo
repo_url: https://github.com/takwaratec/fabrica-modelo
repo_name: takwaratec/fabrica-modelo
edit_uri: edit/main/docs/
copyright: "(c) Tecnologia Takwara, 2026. CC BY 4.0"

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Modo claro
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Modo escuro
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - "Indice Completo": index.md
  - "ATA 07/07/2026": atas-e-pautas/2026-07-07_REUNIAO_FABRICA_MODELO_FINEP.md
  - "Ficha Tecnica - Sistema Techsus": editais/ficha-tecnica-techsus-cavichiolli.md
  - "Contrato Assessoria - R$ 40k + 5%": editais/minuta-contrato-assessoria-finep.md
